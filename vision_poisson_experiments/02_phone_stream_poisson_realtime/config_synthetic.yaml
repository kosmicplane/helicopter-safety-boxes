# Fast deterministic configuration used by tests and the packaged demonstration.
workspace:
  width_m: 6.0
  height_m: 4.5
  grid:
    nx: 64
    ny: 48
  rectified_image:
    # A smaller image keeps the synthetic headless dashboard near real-time.
    width_px: 320
    height_px: 240

calibration:
  mode: assume_top_down
  file: null

segmentation:
  mode: background_reference
  reference_file: ../examples/assets/live_background.png
  hsv:
    lower: [0, 60, 0]
    upper: [179, 255, 230]
    invert: false
  background:
    difference_threshold: 28
    difference_blur_kernel: 3
    use_color_norm: false
  cleanup:
    blur_kernel: 0
    threshold: 127
    open_kernel: 3
    close_kernel: 5
    minimum_component_area_px: 30
    # False prevents the synthetic workspace border from becoming a filled obstacle.
    fill_holes: false
    invert: false
  manual_correction:
    enabled: false

geometry:
  robot_radius_m: 0.005
  perception_margin_m: 0.0001

poisson:
  forcing_method: guidance
  solver: conjugate_gradient
  boundary_value: 0.0
  outer_boundary_as_dirichlet: true
  compute_gradient: true
  compute_hessian: true
  compute_laplacian_check: false
  validation_residual_tolerance: 1.0e-5
  constant:
    c: 1.0
  distance:
    alpha: 0.5
  average_flux:
    b_bar: -1.0
  guidance:
    beta: 6.0
    base_flux_strength: 0.5
    target_mean_abs_scale: 0.05
  conjugate_gradient:
    tolerance: 1.0e-7
    max_iter: 700
  sor:
    omega: 1.75
    max_iter: 1200
    tolerance: 1.0e-4
    residual_check_interval: 25

camera_motion:
  # Disabled only because the generated test camera is exactly fixed.
  enabled: false
  translation_threshold_px: 4.0
  rotation_threshold_deg: 1.5
  minimum_matches: 20
  maximum_features: 1000

live:
  source:
    reconnection_attempts: 0
    reconnection_delay_s: 0.0
  capture_first_frame_as_background: false
  segmentation_modes: [background_reference, hsv]
  forcing_methods: [guidance, distance]
  temporal_filter:
    mode: majority
    window_size: 3
    ema_alpha: 0.4
    ema_threshold: 0.5
    activation_frames: 2
    deactivation_frames: 3
  minimum_changed_fraction: 0.001
  maximum_submit_interval_s: 0.25
  laplacian_every_n_solves: 4
  maximum_field_age_s: 0.5
  worker_shutdown_timeout_s: 15.0

cbf_demo:
  enabled: false
  position_xy_m: [0.5, 0.5]
  goal_xy_m: [5.5, 4.0]
  alpha: 6
  goal_gain: 1.0
  maximum_speed_mps: 0.05
  maximum_field_age_s: 0.5
  arrow_scale_px_per_mps: 120.0

output:
  root: outputs
  dashboard_panel_size: [200, 140]
  record_dashboard_video: false
  dashboard_video_fps: 15.0
  # One low-rate 3D snapshot is expected during a 60-frame demo.
  snapshot_every_n_solves: 30
  save_3d_snapshots: true
  snapshot_3d_dpi: 90

# The baseline synthetic video test keeps the original behavior. Use
# config_contingency_synthetic.yaml for the full HJR diversion validation.
mission_setup:
  mode: load_file
  file: calibration/synthetic_mission.json
  minimum_landing_zones: 2
  maximum_landing_zones: 8
  default_landing_zone_radius_m: 0.1
  minimum_landing_zone_radius_m: 0.05
  maximum_landing_zone_radius_m: 0.1
  radius_adjustment_step_m: 0.025
  minimum_touchdown_margin_m: 0.05
  minimum_zone_edge_separation_m: 0.05
  minimum_start_zone_separation_m: 0.1
  minimum_boundary_clearance_m: 0.04
  default_required_reachable: 2
  save_selection: false
landing_zone_validation:
  raw_occupied_fraction_threshold: 0.02
  inflated_occupied_fraction_threshold: 0.05
  minimum_clearance_m: 0.04
  minimum_valid_seed_cells: 3
  blocked_activation_frames: 2
  clear_deactivation_frames: 6
  latch_rejected_zones: true
reachability:
  enabled: true
  model: planar_single_integrator
  maximum_speed_mps: 0.05
  active_horizon_s: 20.0
  contingency_horizon_s: 10.0
  required_reachable: 2
  connectivity: 8
  recompute_on_occupancy_update: true
  maximum_field_age_s: 0.5
  gradient_epsilon: 1.0e-9
  negative_value_plot_clip: -5.0
planner:
  lookahead_distance_m: 0.25
  goal_gain: 1.0
  maximum_nominal_speed_mps: 0.05
  target_tolerance_m: 0.08
  path_simplification: true
  minimum_path_replan_interval_s: 0.10
poisson_cbf:
  enabled: true
  alpha: 8
  h_margin: 0.01
  maximum_field_age_s: 0.5
  invalid_sample_action: hold
contingency_filter:
  alpha_active: 2
  alpha_contingency: 0.55
  rho_gain: 2.0
  relaxation_weight_active: 35.0
  relaxation_weight_contingency: 35.0
  maximum_relaxation: 50.0
  solver: scipy
  tolerance: 1.0e-8
  failure_action: hold
contingency_demo:
  enabled: false
  arrow_scale_px_per_mps: 150.0