# Physical dimensions and numerical grid of the planar workspace.
workspace:
  width_m: 6.0
  height_m: 4.5
  grid:
    nx: 96
    ny: 72
  rectified_image:
    width_px: 640
    height_px: 480

calibration:
  # Supported modes: interactive, assume_top_down, load_file, identity.
  # A metric live map requires a fixed camera after this calibration.
  mode: interactive
  file: calibration/phone_calibration.json

segmentation:
  # The fixed-camera baseline compares every frame against one frozen empty scene.
  mode: background_reference
  reference_file: null
  hsv:
    lower: [0, 70, 0]
    upper: [179, 255, 235]
    invert: false
  background:
    difference_threshold: 28
    difference_blur_kernel: 5
    use_color_norm: false
  cleanup:
    blur_kernel: 3
    threshold: 127
    open_kernel: 3
    close_kernel: 7
    minimum_component_area_px: 80
    fill_holes: false
    invert: false
  manual_correction:
    enabled: false
    brush_radius_px: 12

geometry:
  # The Poisson domain uses the configuration-space obstacle inflation below.
  robot_radius_m: 0.16
  perception_margin_m: 0.08

poisson:
  forcing_method: constant
  solver: conjugate_gradient
  boundary_value: 0.0
  outer_boundary_as_dirichlet: true
  compute_gradient: true
  compute_hessian: false
  compute_laplacian_check: false
  validation_boundary_tolerance: 1.0e-8
  validation_residual_tolerance: 1.0e-5
  constant:
    c: 1.0
  distance:
    alpha: 0.5
  average_flux:
    b_bar: -1.0
  guidance:
    beta: 8.0
    base_flux_strength: 0.5
    target_mean_abs_scale: 0.35
    nonuniform_axis: null
    nonuniform_gain: 0.0
  conjugate_gradient:
    # This tolerance is intentionally tighter than the independent validation bound.
    tolerance: 1.0e-7
    max_iter: 1600
  sor:
    omega: 1.75
    max_iter: 2200
    tolerance: 1.0e-4
    residual_check_interval: 25

camera_motion:
  # ORB/RANSAC detects a changed camera pose; it does not stabilize the image.
  enabled: true
  translation_threshold_px: 4.0
  rotation_threshold_deg: 1.5
  minimum_matches: 20
  maximum_features: 1200

live:
  source:
    reconnection_attempts: 3
    reconnection_delay_s: 0.25
  # If no reference_file exists, the first rectified frame can be frozen once.
  capture_first_frame_as_background: true
  segmentation_modes: [background_reference, hsv]
  forcing_methods: [constant, distance, average_flux, guidance]
  temporal_filter:
    # Supported modes: majority, ema, hysteresis.
    mode: majority
    window_size: 5
    ema_alpha: 0.35
    ema_threshold: 0.5
    activation_frames: 2
    deactivation_frames: 4
  # Avoid solving nearly identical maps while still refreshing a static scene.
  minimum_changed_fraction: 0.002
  maximum_submit_interval_s: 0.5
  laplacian_every_n_solves: 10
  maximum_field_age_s: 0.75
  worker_shutdown_timeout_s: 15.0

cbf_demo:
  # This mode moves only an on-screen virtual marker; it never controls hardware.
  enabled: false
  position_xy_m: [0.5, 0.5]
  goal_xy_m: [5.5, 4.0]
  alpha: 3.0
  goal_gain: 1.0
  maximum_speed_mps: 0.5
  maximum_field_age_s: 0.5
  arrow_scale_px_per_mps: 120.0

output:
  root: outputs
  dashboard_panel_size: [420, 280]
  record_dashboard_video: true
  dashboard_video_fps: 15.0
  snapshot_every_n_solves: 10
  # Matplotlib is used only for requested snapshots, never for every frame.
  save_3d_snapshots: true
  snapshot_3d_dpi: 110

# Interactive contingency-planning extension. Set reachability.enabled=false to
# recover the original live Poisson-CBF marker behavior.
mission_setup:
  mode: interactive
  file: calibration/live_mission.json
  minimum_landing_zones: 2
  maximum_landing_zones: 8
  default_landing_zone_radius_m: 0.30
  minimum_landing_zone_radius_m: 0.25
  maximum_landing_zone_radius_m: 0.42
  radius_adjustment_step_m: 0.025
  minimum_touchdown_margin_m: 0.05
  minimum_zone_edge_separation_m: 0.12
  minimum_start_zone_separation_m: 0.20
  minimum_boundary_clearance_m: 0.08
  default_required_reachable: 2
  save_selection: true

landing_zone_validation:
  raw_occupied_fraction_threshold: 0.02
  inflated_occupied_fraction_threshold: 0.05
  minimum_clearance_m: 0.05
  minimum_valid_seed_cells: 3
  blocked_activation_frames: 2
  clear_deactivation_frames: 6
  latch_rejected_zones: true

reachability:
  enabled: true
  model: planar_single_integrator
  maximum_speed_mps: 0.50
  active_horizon_s: 20.0
  contingency_horizon_s: 10.0
  required_reachable: 2
  connectivity: 8
  recompute_on_occupancy_update: true
  maximum_field_age_s: 0.75
  gradient_epsilon: 1.0e-9
  negative_value_plot_clip: -5.0

planner:
  lookahead_distance_m: 0.25
  goal_gain: 1.0
  maximum_nominal_speed_mps: 0.45
  target_tolerance_m: 0.08
  path_simplification: true
  minimum_path_replan_interval_s: 0.10

poisson_cbf:
  enabled: true
  alpha: 2.0
  h_margin: 0.05
  maximum_field_age_s: 0.50
  invalid_sample_action: hold

contingency_filter:
  alpha_active: 1.0
  alpha_contingency: 0.55
  rho_gain: 2.0
  relaxation_weight_active: 35.0
  relaxation_weight_contingency: 35.0
  maximum_relaxation: 50.0
  solver: scipy
  tolerance: 1.0e-8
  failure_action: hold

contingency_demo:
  enabled: true
  arrow_scale_px_per_mps: 150.0
