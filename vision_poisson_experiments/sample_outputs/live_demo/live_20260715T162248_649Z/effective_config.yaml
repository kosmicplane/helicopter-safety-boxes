workspace:
  width_m: 6.0
  height_m: 4.5
  grid:
    nx: 64
    ny: 48
  rectified_image:
    width_px: 320
    height_px: 240
calibration:
  mode: assume_top_down
  file: null
segmentation:
  mode: background_reference
  reference_file: ../examples/assets/live_background.png
  hsv:
    lower:
    - 0
    - 60
    - 0
    upper:
    - 179
    - 255
    - 230
    invert: false
  background:
    difference_threshold: 28
    difference_blur_kernel: 3
    use_color_norm: false
  cleanup:
    blur_kernel: 0
    threshold: 127
    open_kernel: 3
    close_kernel: 5
    minimum_component_area_px: 30
    fill_holes: false
    invert: false
  manual_correction:
    enabled: false
geometry:
  robot_radius_m: 0.1
  perception_margin_m: 0.06
poisson:
  forcing_method: constant
  solver: conjugate_gradient
  boundary_value: 0.0
  outer_boundary_as_dirichlet: true
  compute_gradient: true
  compute_hessian: false
  compute_laplacian_check: false
  validation_residual_tolerance: 1.0e-05
  constant:
    c: 1.0
  distance:
    alpha: 0.5
  average_flux:
    b_bar: -1.0
  guidance:
    beta: 6.0
    base_flux_strength: 0.5
    target_mean_abs_scale: 0.35
  conjugate_gradient:
    tolerance: 1.0e-07
    max_iter: 700
  sor:
    omega: 1.75
    max_iter: 1200
    tolerance: 0.0001
    residual_check_interval: 25
camera_motion:
  enabled: false
  translation_threshold_px: 4.0
  rotation_threshold_deg: 1.5
  minimum_matches: 20
  maximum_features: 1000
live:
  source:
    reconnection_attempts: 0
    reconnection_delay_s: 0.0
  capture_first_frame_as_background: false
  segmentation_modes:
  - background_reference
  - hsv
  forcing_methods:
  - constant
  - distance
  temporal_filter:
    mode: majority
    window_size: 3
    ema_alpha: 0.4
    ema_threshold: 0.5
    activation_frames: 2
    deactivation_frames: 3
  minimum_changed_fraction: 0.001
  maximum_submit_interval_s: 0.25
  laplacian_every_n_solves: 4
  maximum_field_age_s: 1.0
  worker_shutdown_timeout_s: 15.0
cbf_demo:
  enabled: false
  position_xy_m:
  - 0.5
  - 0.5
  goal_xy_m:
  - 5.5
  - 4.0
  alpha: 3.0
  goal_gain: 1.0
  maximum_speed_mps: 0.5
  maximum_field_age_s: 0.8
  arrow_scale_px_per_mps: 120.0
output:
  root: outputs
  dashboard_panel_size:
  - 200
  - 140
  record_dashboard_video: false
  dashboard_video_fps: 15.0
  snapshot_every_n_solves: 30
  save_3d_snapshots: true
  snapshot_3d_dpi: 90
