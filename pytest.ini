[pytest]
pythonpath =
    .
    safety_box_core/src
    safety_filter_box/src
    clf_safety_box/src
    contingency_safety_box/src
    poisson_safety_box
    cbf_safety_box
    vision_poisson_experiments
testpaths =
    tests
    poisson_safety_box/tests
    cbf_safety_box/tests
addopts = -q -ra
markers =
    integration: end-to-end experiments that may take several seconds
